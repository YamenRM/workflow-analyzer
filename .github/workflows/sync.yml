- name: Upload to Hugging Face
  env:
    HF_TOKEN: ${{ secrets.HF_TOKEN }}
  run: |
    pip install huggingface_hub
    python - <<EOF
from huggingface_hub import upload_folder
import os

upload_folder(
    folder_path='.',
    repo_id='YamenRM/workflow-analyzer',
    repo_type='space',
    token=os.environ['HF_TOKEN']
)
EOF
